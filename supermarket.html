 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="supermarket.css">
 </head>
 <body>
    <div class="ai-container">
    <aside class="ai-sidebar">
        <div class="new-chat">+ New Interaction</div>
        <ul class="chat-history">
            <li>Generate Market Report</li>
            <li>Code Debugging</li>
            <li>Travel Itinerary</li>
        </ul>
    </aside>

    <main class="ai-main">
        <div class="ai-output">
            <div class="ai-bubble">
                <p>Hello! I am your AI assistant. How can I help you design today?</p>
            </div>
        </div>

        <div class="ai-input-wrapper">
            <input type="text" placeholder="Ask me anything..." id="ai-input">
            <button class="ai-send-btn">✦</button>
        </div>
    </main>
</div>
 </body>
 </html>
