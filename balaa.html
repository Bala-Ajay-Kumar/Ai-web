 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .cover {
    display: flex;
}

.sidebar {
    padding: 20px;
    width: 270px;
    background-color: #002159;
    height: 100vh;
    border: 1px solid black;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
}

.head {
    font-size: 40px;
    font-family: Roboto;
    color: #ffffff;
    font-weight: 500;
    text-align: center;
}

.sidebar-item {
    display: flex;
    flex-direction: row;
    text-align: center;
}

.icon {
    font-size: 19px;
    color: white;
    padding: 19px;
}

.icon-name {
    font-family: Roboto;
    font-size: 19px;
    color: #ffffff;
}
.profile-pic{
    height:50px;
    width:50px;
    border-radius:25px;
}
.icon-names{
    font-family: Roboto;    
    font-size: 19px;
    color: #ffffff;     
    gap:10px;
    padding-left:10px;

}
.selected{      

    background-color:#ffffff33;
}

    </style>
 </head>
 <body>
     <div class="cover">
        <div class="sidebar">
            <div>
                <h1 class="head">Dashboard</h1>
                <div class="sidebar-item">
                    <i class="fas fa-home icon"></i>
                    <p class="icon-name">Home</p>
                </div>
                <div class="sidebar-item">
                    <i class="fas fa-download icon"></i>
                    <p class="icon-name">Downloads</p>
                </div>
                <div class="sidebar-item selected">
                    <i class="far fa-star icon"></i>
                    <p class="icon-name">phone</p>
                </div>
                <div class="sidebar-item">
                    <i class="fas fa-cog icon"></i>
                    <p class="icon-name">Settings</p>
                </div>
            </div>
              <div class="sidebar-item">
                <img src="https://assets.ccbp.in/frontend/intermediate-rwd/user-profile-img.png" class="profile-pic" />
                <p class="icon-names">Sarah Meyers</p>
            
        </div>
    </div>
 </body>
 </html>
